appId: com.anonymous.mem
name: Inline ✕ clears the search query (replaces the old Clean button)
---
- runFlow: common/setup.yaml

# Type a query
- tapOn:
    id: "search-input"
- inputText: "docker"

# Wait for debounce + result render
- extendedWaitUntil:
    visible: "docker"
    timeout: 3000

# The inline ✕ button inside the search pill clears the query.
- tapOn:
    id: "search-input"
# The X has accessibilityLabel="Clear search" and only exists when
# query.length > 0; its view has no stable testID so we target label.
- tapOn: "Clear search"
- assertVisible:
    id: "open-category-*"
