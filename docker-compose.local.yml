services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8040:8000"
    environment:
      - MEM_HOME=/app/data
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/seed.meta.json')"]
      interval: 5s
      timeout: 5s
      retries: 12
