services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3030').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - BASE_URL=http://web:3030
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./web/test-results:/app/test-results
      - ./web/playwright-report:/app/playwright-report
